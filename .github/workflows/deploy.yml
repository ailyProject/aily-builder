name: Check and Deploy to NPM

on:
  push:
    branches:
      - deploy

jobs:
  build-bundles:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/deploy' }}
    name: Build native bundle (${{ matrix.platform }})
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runs_on: '["self-hosted","ailydeMac-mini","macOS","ARM64"]'
          - platform: win32-x64
            runs_on: '"windows-2022"'
    defaults:
      run:
        shell: bash
    env:
      NPM_CONFIG_FETCH_RETRIES: 5
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 10000
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
      NPM_CONFIG_FETCH_TIMEOUT: 300000
      npm_config_msvs_version: 2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org

      - name: Build native bundle
        run: npm run bundle:native:minify

      - name: Check npm package
        run: npm pack --dry-run ./dist/bundle-min

      - name: Upload native bundle
        uses: actions/upload-artifact@v4
        with:
          name: aily-builder-${{ matrix.platform }}
          path: dist/bundle-min
          if-no-files-found: error

  publish-default:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/deploy' }}
    name: Publish default registry
    needs: build-bundles
    runs-on: [self-hosted, ailydeMac-mini, macOS, ARM64]
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    env:
      NPM_CONFIG_FETCH_RETRIES: 5
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 10000
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
      NPM_CONFIG_FETCH_TIMEOUT: 300000
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: ${{ secrets.REGISTRY_URL }}

      - name: Download native bundles
        uses: actions/download-artifact@v4
        with:
          pattern: aily-builder-*
          path: dist/native-bundles

      - name: Publish bundles to default registry
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          retry_with_backoff() {
            local max_attempts="$1"
            local sleep_seconds="$2"
            shift 2
            local attempt=1

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${max_attempts} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed. Retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
              sleep_seconds=$((sleep_seconds * 2))
            done
          }

          for package_dir in dist/native-bundles/aily-builder-*; do
            if [ ! -f "$package_dir/package.json" ]; then
              echo "::warning::Skipping $package_dir because package.json was not found"
              continue
            fi

            CURRENT_VERSION=$(node -p "require('./$package_dir/package.json').version")
            PACKAGE_NAME=$(node -p "require('./$package_dir/package.json').name")
            echo "Package: $PACKAGE_NAME@$CURRENT_VERSION"

            if npm view "$PACKAGE_NAME@$CURRENT_VERSION" version &> /dev/null; then
              echo "Version $CURRENT_VERSION exists, unpublishing..."
              retry_with_backoff 3 3 npm unpublish "$PACKAGE_NAME@$CURRENT_VERSION" --force
              sleep 5
            fi

            retry_with_backoff 5 5 npm publish "$package_dir" --access public
          done

      - name: Notify cache bump
        env:
          NOTIFY_URL: ${{ secrets.NOTIFY_URL }}
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
        run: |
          if [ -z "$NOTIFY_URL" ] || [ -z "$NOTIFY_TOKEN" ]; then
            echo "NOTIFY_URL or NOTIFY_TOKEN not set, skipping."
            exit 0
          fi
          echo "Sending POST request to $NOTIFY_URL"
          set +e
          HTTP_STATUS=$(curl -s -o /tmp/notify_response.txt -w "%{http_code}" --max-time 30 \
            -X POST "$NOTIFY_URL" \
            -H "Authorization: Bearer $NOTIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          CURL_EXIT=$?
          set -e
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::warning::Notification request failed (curl exit code $CURL_EXIT)"
          elif [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Notification sent successfully (HTTP $HTTP_STATUS)"
          else
            echo "::warning::Notification failed with HTTP status $HTTP_STATUS"
            cat /tmp/notify_response.txt || true
          fi

  publish-registry2:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/deploy' }}
    name: Publish registry 2 (${{ matrix.platform }})
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runs_on: '["self-hosted","ailydeMac-mini","macOS","ARM64"]'
          - platform: win32-x64
            runs_on: '"windows-2022"'
    defaults:
      run:
        shell: bash
    env:
      NPM_CONFIG_FETCH_RETRIES: 5
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 10000
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
      NPM_CONFIG_FETCH_TIMEOUT: 300000
      npm_config_msvs_version: 2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org

      - name: Build native bundle
        run: npm run bundle:native:minify

      - name: Check npm package
        run: npm pack --dry-run ./dist/bundle-min

      - name: Publish bundle to registry 2
        env:
          REGISTRY_2: ${{ secrets.REGISTRY_URL_2 }}
          TOKEN_2: ${{ secrets.NPM_TOKEN_2 }}
        run: |
          retry_with_backoff() {
            local max_attempts="$1"
            local sleep_seconds="$2"
            shift 2
            local attempt=1

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${max_attempts} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed. Retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
              sleep_seconds=$((sleep_seconds * 2))
            done
          }

          if [ -z "$REGISTRY_2" ] || [ -z "$TOKEN_2" ]; then
            echo "Registry 2 secrets not set, skipping."
            exit 0
          fi

          REGISTRY_2_NO_PROTO=$(echo "$REGISTRY_2" | sed 's/^https\?:\/\///')
          REGISTRY_2_NO_PROTO=$(echo "$REGISTRY_2_NO_PROTO" | sed 's/\/$//')

          echo "registry=$REGISTRY_2" > .npmrc
          echo "//$REGISTRY_2_NO_PROTO/:_authToken=$TOKEN_2" >> .npmrc
          trap 'rm -f .npmrc' EXIT

          CURRENT_VERSION=$(node -p "require('./dist/bundle-min/package.json').version")
          PACKAGE_NAME=$(node -p "require('./dist/bundle-min/package.json').name")
          echo "Package: $PACKAGE_NAME@$CURRENT_VERSION"

          if npm view "$PACKAGE_NAME@$CURRENT_VERSION" version &> /dev/null; then
            echo "Version $CURRENT_VERSION exists on $REGISTRY_2, unpublishing..."
            retry_with_backoff 3 3 npm unpublish "$PACKAGE_NAME@$CURRENT_VERSION" --force
            sleep 5
          fi

          retry_with_backoff 5 5 npm publish ./dist/bundle-min --access public

      - name: Notify cache bump for registry 2
        env:
          NOTIFY_URL: ${{ secrets.NOTIFY_URL_2 }}
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN_2 }}
        run: |
          if [ -z "$NOTIFY_URL" ] || [ -z "$NOTIFY_TOKEN" ]; then
            echo "NOTIFY_URL_2 or NOTIFY_TOKEN_2 not set, skipping."
            exit 0
          fi
          echo "Sending POST request to $NOTIFY_URL"
          set +e
          HTTP_STATUS=$(curl -s -o /tmp/notify_response_2.txt -w "%{http_code}" --max-time 30 \
            -X POST "$NOTIFY_URL" \
            -H "Authorization: Bearer $NOTIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          CURL_EXIT=$?
          set -e
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::warning::Notification (Registry 2) request failed (curl exit code $CURL_EXIT)"
          elif [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Notification (Registry 2) sent successfully (HTTP $HTTP_STATUS)"
          else
            echo "::warning::Notification (Registry 2) failed with HTTP status $HTTP_STATUS"
            cat /tmp/notify_response_2.txt || true
          fi
